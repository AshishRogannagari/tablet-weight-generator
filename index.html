<!DOCTYPE html>
<html lang="en">

<head>
<meta charset="UTF-8">
<title>Tablet Weight Generator</title>
<link rel="stylesheet" href="style.css">
</head>

<body>

<div class="container">

<h1>Tablet Weight Generator</h1>
<p class="subtitle">Generate 20 tablet weights based on target average</p>

<div class="input-section">

<input id="avg" type="number" placeholder="Enter target average">

<button class="generate" onclick="generate()">Generate Samples</button>

<button class="reset" onclick="resetTable()">Reset</button>

</div>

<div class="cards">

<div class="card">
<h3>Average</h3>
<p id="avgResult">-</p>
</div>

<div class="card">
<h3>Highest Error %</h3>
<p id="highError">-</p>
</div>

<div class="card">
<h3>Lowest Error %</h3>
<p id="lowError">-</p>
</div>

</div>

<table>

<thead>
<tr>
<th>Sample</th>
<th>Weight</th>
</tr>
</thead>

<tbody id="tableBody"></tbody>

</table>

</div>

<script src="script.js"></script>

</body>
</html>
